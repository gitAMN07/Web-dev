<div class="product-card">

  <div class="image-wrapper">
    <img
      [src]="selectedImage"
      alt="{{ product.name }}"
      class="main-image"
    />
  </div>

  <div class="thumbnails">
    <img
      *ngFor="let img of product.images"
      [src]="img"
      (click)="selectImage(img)"
      [class.active]="img === selectedImage"
    />
  </div>

  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p class="description">{{ product.description }}</p>

    <p class="price">{{ product.price }} ₸</p>

    <div class="rating">
    ⭐    {{ product.rating }}
    </div>

    <div class="likes" (click)="likeProduct()">
      ❤️ {{ product.likes }}
    </div>

    <div class="buttons">
      <a [href]="product.link" target="_blank">
        <button>View</button>
      </a>
    
      <a [href]="'https://wa.me/?text=' + product.link" target="_blank">
        <button>WhatsApp</button>
      </a>
    
      <a [href]="'https://t.me/share/url?url=' + product.link" target="_blank">
        <button>Telegram</button>
      </a>
    </div>
  </div>

</div>
